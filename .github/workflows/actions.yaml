# CICD using GitHub actions

name: CI/CD #name of workflow or pipeline

# Exclude the workflow to run on changes to the helm chart (avoids a trigger loop, since this workflow itself commits to helm/**)
on:
  push:
    branches:
      - main #only braach that will get push to the pipeline and triger the workflow
    paths-ignore: # under this line are files and folders you want your github actions to ignore
      - 'helm/**'
      - 'k8s/**'
      - 'README.md'
      - 'CICD.md'
      - 'how-it-works.md'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go 1.22
      uses: actions/setup-go@v5          # updated from v2 current version, includes built-in module caching
      with:
        go-version: 1.22

    - name: Build
      run: go build -o go-app

    - name: Test
      run: go test ./...

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go 1.22
      uses: actions/setup-go@v5          # added golangci-lint needs Go available to resolve imports
      with:
        go-version: 1.22

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.56.2

  push:
    runs-on: ubuntu-latest

    needs: [build, code-quality]         # now waits on both a failing lint blocks the image push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push action
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/go-app:${{ github.run_id }}
          ${{ secrets.DOCKERHUB_USERNAME }}/go-app:latest

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest

    needs: push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}       # renamed from TOKEN rename the actual repo secret to match

    - name: Update tag in Helm chart
      run: |
        sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' helm/go-app-chart/values.yaml

    - name: Commit and push changes
      run: |
        git config --global user.email "oneilkimbi1@gmail.com"
        git config --global user.name "Oneil Kimbi"
        git add helm/go-app-chart/values.yaml
        git diff --staged --quiet && echo "No changes to commit" || (git commit -m "Update tag in Helm chart" && git push)